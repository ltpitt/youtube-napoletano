<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>'O Tubb napulitano 🌋</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div id="topbar" class="topbar"></div>
        <h1>'O Tubb napulitano 🌋</h1>
        <form id="downloadForm">
            <input id="urlInput" type="text" name="url" placeholder="Miette ccà 'o link d''o video 'e YouTube" required>
            <div id="metaCard" class="meta-card" style="display:none">
                <img id="metaThumb" class="meta-thumb" src="" alt="thumbnail">
                <div class="meta-body">
                    <div id="metaTitle" class="meta-title"></div>
                    <div id="metaDesc" class="meta-desc"></div>
                </div>
            </div>
            <div class="toggle-group">
                <label class="toggle-label">
                    <span class="toggle-text">Sulo audio</span>
                    <input type="checkbox" name="audio_only" class="toggle-input">
                    <span class="toggle-switch"></span>
                </label>
            </div>
            <div class="toggle-group">
                <label class="toggle-label">
                    <span class="toggle-text">Scarrica 'e sottotitole</span>
                    <input type="checkbox" name="subtitles" class="toggle-input">
                    <span class="toggle-switch"></span>
                </label>
            </div>
            <button type="submit">Scarrica</button>
        </form>
        <div id="progressContainer" class="progress-container">
            <div class="progress-header"></div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="progressInfo" class="progress-info"></div>
        </div>
        <div id="messageBox"></div>
        <div class="footer">
            <a href="#" id="updateLink">⚙️ Aggiorna yt-dlp</a>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
