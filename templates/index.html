<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>'O Tubb napulitano 🌋</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div id="topbar" class="topbar"></div>
        <div class="card-header">
            <h1>'O Tubb napulitano 🌋</h1>
            <div class="header-actions">
                <button id="themeToggleBtn" class="theme-btn" title="Toggle dark/light mode" aria-label="Toggle tema">
                    <svg class="theme-icon theme-icon-light" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="theme-icon theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button id="settingsBtn" class="settings-btn" title="Apri impostazioni" aria-label="Impostazioni">
                    <svg class="settings-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
        <form id="downloadForm" novalidate>
            <div id="urlList">
                <div class="url-row">
                    <input type="text" name="url" class="url-input" placeholder="Miette ccà 'o link d''o video 'e YouTube" data-i18n-placeholder="download.placeholder" required>
                </div>
            </div>
            <button type="button" id="addUrlBtn" class="add-url-btn" data-i18n="batch.add_url">+ Aggiugne n'ata URL</button>
            <div id="metaCard" class="meta-card" style="display:none">
                <div id="videoPlayer" class="video-player">
                    <iframe id="videoFrame" class="video-frame" src="" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                </div>
            </div>
            <div class="toggle-group">
                <label class="toggle-label">
                    <span class="toggle-text" data-i18n="download.audio_only_label">Sulo audio</span>
                    <input type="checkbox" name="audio_only" class="toggle-input">
                    <span class="toggle-switch"></span>
                </label>
            </div>
            <div class="toggle-group">
                <label class="toggle-label">
                    <span class="toggle-text" data-i18n="download.subtitles_label">Scarrica 'e sottotitole</span>
                    <input type="checkbox" name="subtitles" class="toggle-input" checked>
                    <span class="toggle-switch"></span>
                </label>
            </div>
            <button type="submit" data-i18n="download.button">Scarrica</button>
        </form>
        <div id="progressContainer" class="progress-container">
            <div class="progress-header"></div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="progressInfo" class="progress-info"></div>
        </div>
        <div id="messageBox"></div>
        <div class="footer">
            <!-- Footer is now clean -->
        </div>
    </div>
    
    <!-- Settings Drawer -->
    <div id="settingsBackdrop" class="settings-backdrop"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <div class="settings-header">
            <h2>Impostazioni</h2>
            <button id="closeSettingsBtn" class="close-settings" aria-label="Chiudi impostazioni">✕</button>
        </div>
        <div class="settings-content">
            <div class="settings-group">
                <label for="cookiesTextarea" data-i18n="settings.cookies_label">YouTube Cookies (optional)</label>
                <textarea id="cookiesTextarea" class="cookies-textarea" placeholder="Paste cookies.txt content here (for NAS or headless systems)" data-i18n-placeholder="settings.cookies_placeholder"></textarea>
                <small class="settings-help-text" data-i18n="settings.cookies_help">Used as fallback if browser cookie extraction fails</small>
            </div>
            <div class="settings-group">
                <label for="languageSelector" data-i18n="settings.language_label">Language</label>
                <select id="languageSelector" class="language-selector"></select>
            </div>
            <div class="settings-group">
                <p class="settings-group-title" data-i18n="settings.update_section">Application</p>
                <button id="updateLink" class="update-btn" data-i18n="update.button">Update</button>
            </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
