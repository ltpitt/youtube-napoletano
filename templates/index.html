<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>'O Tubb napulitano 🌋</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div id="topbar" class="topbar"></div>
        <div class="card-header">
            <h1>'O Tubb napulitano 🌋</h1>
            <button id="settingsBtn" class="settings-btn" title="Apri impostazioni" aria-label="Impostazioni">⚙️</button>
        </div>
        <form id="downloadForm">
            <input id="urlInput" type="text" name="url" placeholder="Miette ccà 'o link d''o video 'e YouTube" required>
            <div id="metaCard" class="meta-card" style="display:none">
                <div id="videoPlayer" class="video-player">
                    <iframe id="videoFrame" class="video-frame" src="" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                </div>
            </div>
            <div class="toggle-group">
                <label class="toggle-label">
                    <span class="toggle-text">Sulo audio</span>
                    <input type="checkbox" name="audio_only" class="toggle-input">
                    <span class="toggle-switch"></span>
                </label>
            </div>
            <div class="toggle-group">
                <label class="toggle-label">
                    <span class="toggle-text">Scarrica 'e sottotitole</span>
                    <input type="checkbox" name="subtitles" class="toggle-input" checked>
                    <span class="toggle-switch"></span>
                </label>
            </div>
            <button type="submit">Scarrica</button>
        </form>
        <div id="progressContainer" class="progress-container">
            <div class="progress-header"></div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="progressInfo" class="progress-info"></div>
        </div>
        <div id="messageBox"></div>
        <div class="footer">
            <!-- Footer is now clean -->
        </div>
    </div>
    
    <!-- Settings Drawer -->
    <div id="settingsBackdrop" class="settings-backdrop"></div>
    <div id="settingsDrawer" class="settings-drawer">
        <div class="settings-header">
            <h2>Impostazioni</h2>
            <button id="closeSettingsBtn" class="close-settings" aria-label="Chiudi impostazioni">✕</button>
        </div>
        <div class="settings-content">
            <div class="settings-group">
                <button id="updateLink" class="update-btn">🔄 Aggiorna</button>
            </div>
            <div class="settings-group">
                <label for="languageSelector">Lingua / Language:</label>
                <select id="languageSelector" class="language-selector"></select>
            </div>
            <div class="settings-group">
                <label class="theme-label">Modalità scura / Dark mode</label>
                <label class="theme-toggle settings-theme">
                    <input type="checkbox" id="themeCheckbox2" class="theme-checkbox">
                    <span class="theme-slider"></span>
                </label>
            </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
